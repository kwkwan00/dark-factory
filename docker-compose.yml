services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    # Port exposed only for local dev/adminer access. Remove or
    # restrict to 127.0.0.1 in production.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-darkfactory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darkfactory}
      POSTGRES_DB: ${POSTGRES_DB:-darkfactory_metrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darkfactory} -d ${POSTGRES_DB:-darkfactory_metrics}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Lightweight web UI for troubleshooting the Postgres metrics store.
  # Browse to http://localhost:8080 and log in with:
  #   System:   PostgreSQL
  #   Server:   postgres          (the compose service name)
  #   Username: ${POSTGRES_USER:-darkfactory}
  #   Password: ${POSTGRES_PASSWORD:-darkfactory}
  #   Database: ${POSTGRES_DB:-darkfactory_metrics}
  # ADMINER_DEFAULT_SERVER pre-fills the Server field to the compose
  # hostname so the operator only has to type credentials.
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      # Enables /api/v1/admin/tsdb/delete_series + clean_tombstones so
      # the app's admin clear-all endpoint can wipe Prometheus data.
      - --web.enable-admin-api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus

  dark-factory:
    build: .
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      POSTGRES_ENABLED: "true"
      POSTGRES_URL: postgresql://${POSTGRES_USER:-darkfactory}:${POSTGRES_PASSWORD:-darkfactory}@postgres:5432/${POSTGRES_DB:-darkfactory_metrics}
      PROMETHEUS_ENABLED: "true"
      PROMETHEUS_URL: http://prometheus:9090
      DEEP_AGENT_DEBUG_STDERR: "1"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
  prometheus_data:
  grafana_data:
