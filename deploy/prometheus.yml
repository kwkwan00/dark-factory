global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dark-factory

scrape_configs:
  - job_name: dark-factory
    metrics_path: /metrics
    static_configs:
      - targets:
          - dark-factory:8000
    # When Prometheus and the app run on the same docker-compose network,
    # service name resolution gives dark-factory:8000 without additional DNS.
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
